<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a8aa0"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#0a0e14"/>
  <text x="32" y="44" fill="#34d399" font-size="22" font-weight="bold" letter-spacing="2">commit<tspan fill="#e2e8f0">-storyteller</tspan></text>
  <text x="32" y="66" fill="#6b7c93" font-size="12">staged diff → clean commit message (offline-first, LLM-optional)</text>

  <!-- git commit -->
  <rect x="330" y="90" width="240" height="50" rx="8" fill="#111722" stroke="#243044"/>
  <text x="450" y="111" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">git commit</text>
  <text x="450" y="128" fill="#6b7c93" font-size="10" text-anchor="middle">prepare-commit-msg hook fires</text>

  <!-- diff parser -->
  <rect x="330" y="166" width="240" height="58" rx="8" fill="#111722" stroke="#38bdf8"/>
  <text x="450" y="189" fill="#38bdf8" font-size="13" text-anchor="middle" font-weight="bold">diff parser</text>
  <text x="450" y="208" fill="#c8d3e0" font-size="10" text-anchor="middle">FileChange[]: status · ±counts · hunks</text>

  <!-- diff processor -->
  <rect x="330" y="250" width="240" height="66" rx="8" fill="#111722" stroke="#38bdf8"/>
  <text x="450" y="272" fill="#38bdf8" font-size="13" text-anchor="middle" font-weight="bold">diff processor</text>
  <text x="450" y="290" fill="#c8d3e0" font-size="10" text-anchor="middle">collapse noise · rank by signal</text>
  <text x="450" y="305" fill="#c8d3e0" font-size="10" text-anchor="middle">trim to token budget</text>

  <!-- provider strategy -->
  <rect x="330" y="342" width="240" height="58" rx="8" fill="#161d2b" stroke="#34d399" stroke-width="2"/>
  <text x="450" y="365" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">provider (Strategy)</text>
  <text x="450" y="384" fill="#6b7c93" font-size="10" text-anchor="middle">one generate() method</text>

  <!-- providers on the right -->
  <rect x="620" y="250" width="250" height="150" rx="8" fill="#0d131d" stroke="#243044"/>
  <text x="745" y="274" fill="#34d399" font-size="12" text-anchor="middle" font-weight="bold">offline (default, no key)</text>
  <text x="745" y="292" fill="#6b7c93" font-size="10" text-anchor="middle">deterministic summarizer</text>
  <line x1="640" y1="306" x2="850" y2="306" stroke="#243044"/>
  <text x="745" y="328" fill="#c8d3e0" font-size="11" text-anchor="middle">anthropic · openai</text>
  <text x="745" y="346" fill="#c8d3e0" font-size="11" text-anchor="middle">ollama (local)</text>
  <text x="745" y="372" fill="#6b7c93" font-size="9" text-anchor="middle">injectable fetch → testable</text>
  <text x="745" y="388" fill="#fbbf24" font-size="9" text-anchor="middle">failure ──► fall back to offline</text>

  <!-- sanitizer -->
  <rect x="330" y="426" width="240" height="66" rx="8" fill="#111722" stroke="#38bdf8"/>
  <text x="450" y="448" fill="#38bdf8" font-size="13" text-anchor="middle" font-weight="bold">sanitizer + merge</text>
  <text x="450" y="466" fill="#c8d3e0" font-size="10" text-anchor="middle">strip fences/lead-ins · cap subject</text>
  <text x="450" y="481" fill="#c8d3e0" font-size="10" text-anchor="middle">insert above # comments · keep user text</text>

  <!-- output -->
  <rect x="330" y="512" width="240" height="34" rx="8" fill="#0f1a14" stroke="#34d399"/>
  <text x="450" y="533" fill="#34d399" font-size="12" text-anchor="middle" font-weight="bold">COMMIT_EDITMSG (you review)</text>

  <!-- left rail: never block -->
  <rect x="30" y="342" width="270" height="150" rx="8" fill="#1a140f" stroke="#fbbf24" stroke-dasharray="4 3"/>
  <text x="165" y="366" fill="#fbbf24" font-size="12" text-anchor="middle" font-weight="bold">guarantee</text>
  <text x="165" y="390" fill="#c8d3e0" font-size="11" text-anchor="middle">the hook can NEVER</text>
  <text x="165" y="407" fill="#c8d3e0" font-size="11" text-anchor="middle">block your commit</text>
  <text x="165" y="431" fill="#6b7c93" font-size="9" text-anchor="middle">remote fail → offline summary</text>
  <text x="165" y="446" fill="#6b7c93" font-size="9" text-anchor="middle">hook crash → `|| true`</text>
  <text x="165" y="461" fill="#6b7c93" font-size="9" text-anchor="middle">user wrote -m → untouched</text>
  <text x="165" y="476" fill="#6b7c93" font-size="9" text-anchor="middle">empty diff → no-op</text>

  <!-- edges -->
  <line x1="450" y1="140" x2="450" y2="162" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="224" x2="450" y2="246" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="316" x2="450" y2="338" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="371" x2="616" y2="340" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 620 392 q -120 30 -168 30" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowAmber)"/>
  <line x1="450" y1="400" x2="450" y2="422" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="492" x2="450" y2="510" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
